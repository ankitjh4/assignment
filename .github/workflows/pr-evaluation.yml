name: DRINKOO PR Evaluation

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  evaluate:
    name: Evaluate Capstone Submission
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run DRINKOO evaluation
        run: python scripts/evaluate_submission.py --repo . --min-score 70
