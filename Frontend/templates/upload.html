{% extends "base.html" %}
{% block title %}Upload{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10"
     x-data="uploadPage()" x-init="init()">

  <div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-900">Image Upload</h1>
    <p class="text-gray-500 text-sm mt-1">
      Supported: JPG, PNG, GIF, WebP · Max 5 MB
    </p>
  </div>

  <!-- Success state -->
  <div x-show="result" class="card text-center space-y-4">
    <div class="text-5xl">✅</div>
    <h2 class="text-xl font-semibold text-gray-800">Upload successful!</h2>
    <div class="text-left bg-gray-50 rounded-lg p-4 text-sm space-y-1">
      <div><span class="font-medium">Original name:</span> <span x-text="result?.original_name"></span></div>
      <div><span class="font-medium">Stored as:</span> <span x-text="result?.filename"></span></div>
      <div><span class="font-medium">Type:</span> <span x-text="result?.content_type"></span></div>
      <div><span class="font-medium">Size:</span> <span x-text="result ? (result.size_bytes/1024).toFixed(1) + ' KB' : ''"></span></div>
    </div>
    <button @click="reset()" class="btn-primary">Upload another</button>
  </div>

  <!-- Upload form -->
  <div x-show="!result" class="card space-y-5">

    <!-- Drop zone -->
    <div @drop.prevent="drop($event)"
         @dragover.prevent
         @click="$refs.fileInput.click()"
         class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center cursor-pointer hover:border-green-400 hover:bg-green-50 transition-colors">

      <img x-show="preview" :src="preview" class="max-h-48 mx-auto rounded-lg object-contain mb-2" />

      <div x-show="!preview" class="pointer-events-none">
        <div class="text-4xl mb-2">🖼️</div>
        <p class="text-gray-600 font-medium">Drag & drop or click to select</p>
        <p class="text-gray-400 text-sm mt-1">JPG, PNG, GIF, WebP · Max 5 MB</p>
      </div>

      <input type="file" x-ref="fileInput" accept="image/jpeg,image/png,image/gif,image/webp"
             @change="pick($event)" class="hidden" />
    </div>

    <!-- File info -->
    <div x-show="file" class="flex items-center justify-between bg-gray-50 rounded-lg px-4 py-3 text-sm">
      <span class="text-gray-700 truncate" x-text="file?.name"></span>
      <span class="text-gray-400 ml-2 flex-shrink-0" x-text="file ? (file.size/1024).toFixed(0) + ' KB' : ''"></span>
    </div>

    <p x-show="error" x-text="error" class="error-text"></p>

    <div class="flex gap-3">
      <button @click="upload()" :disabled="!file || loading" class="btn-primary flex-1">
        <span x-text="loading ? 'Uploading…' : 'Upload image'"></span>
      </button>
      <button x-show="file" @click="reset()" class="btn-secondary">Clear</button>
    </div>
  </div>
</div>
{% endblock %}
