{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-12"
     x-data="loginPage()">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🥤</div>
      <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
      <p class="text-gray-500 text-sm mt-1">Login to access the DRINKOO chatbot</p>
    </div>

    <div class="card">
      <form @submit.prevent="submit()" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" x-model="email" required autocomplete="email"
                 placeholder="you@example.com" class="input-field" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" x-model="password" required autocomplete="current-password"
                 placeholder="••••••••" class="input-field" />
        </div>

        <p x-show="error" x-text="error" class="error-text"></p>

        <button type="submit" :disabled="loading" class="btn-primary w-full"
                style="width:100%;justify-content:center;display:flex;">
          <span x-text="loading ? 'Logging in…' : 'Login'"></span>
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-4">
        Don't have an account?
        <a href="/signup" class="text-green-600 font-medium hover:underline">Sign up free</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
