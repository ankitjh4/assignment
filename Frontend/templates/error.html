{% extends "base.html" %}
{% block title %}{{ code }} - {{ app_name }}{% endblock %}
{% block content %}
<section class="error-shell">
  <h1>{{ code }}</h1>
  <p>{{ message }}</p>
  {% if login_link %}<p><a class="btn primary" href="/login">Go to log in</a></p>{% endif %}
  <p><a class="btn ghost" href="/">Back home</a></p>
</section>
{% endblock %}
