{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-12"
     x-data="signupPage()">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🥤</div>
      <h1 class="text-2xl font-bold text-gray-900">Create your account</h1>
      <p class="text-gray-500 text-sm mt-1">Free access to the DRINKOO AI assistant</p>
    </div>

    <div class="card">
      <form @submit.prevent="submit()" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full name</label>
          <input type="text" x-model="fullName" required autocomplete="name"
                 placeholder="Your name" class="input-field" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" x-model="email" required autocomplete="email"
                 placeholder="you@example.com" class="input-field" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" x-model="password" required autocomplete="new-password"
                 placeholder="At least 8 characters" class="input-field" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm password</label>
          <input type="password" x-model="confirm" required autocomplete="new-password"
                 placeholder="Repeat your password" class="input-field" />
        </div>

        <p x-show="error" x-text="error" class="error-text"></p>

        <button type="submit" :disabled="loading" class="btn-primary"
                style="width:100%;justify-content:center;display:flex;">
          <span x-text="loading ? 'Creating account…' : 'Create account'"></span>
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-4">
        Already have an account?
        <a href="/login" class="text-green-600 font-medium hover:underline">Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
