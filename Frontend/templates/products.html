{% extends "base.html" %}
{% block title %}Products - {{ app_name }}{% endblock %}
{% block content %}
<section class="catalog-shell">
  <header class="section-header">
    <h1>The DRINKOO catalog</h1>
    <p class="muted">Sparkling, still, citrus, berry, tea, water, kids, sports, and cold-brew coffee.</p>
  </header>
  <div class="filters">
    <select id="filter-category">
      <option value="">All categories</option>
      <option value="citrus">Citrus</option>
      <option value="berry">Berry</option>
      <option value="herbal">Herbal</option>
      <option value="cola">Cola</option>
      <option value="tea">Tea</option>
      <option value="water">Water</option>
      <option value="kids">Kids</option>
      <option value="sports">Sports</option>
      <option value="coffee">Coffee</option>
    </select>
    <label><input type="checkbox" id="filter-sparkling" /> Sparkling only</label>
    <label><input type="checkbox" id="filter-bulk" /> Bulk-eligible</label>
    <label>Max sugar (g/100ml): <input type="number" id="filter-max-sugar" min="0" max="20" step="0.5" placeholder="any" /></label>
  </div>
  <div class="product-grid" id="product-grid" aria-live="polite"></div>
</section>
{% endblock %}
{% block scripts %}
<script src="/static/js/products.js"></script>
{% endblock %}
