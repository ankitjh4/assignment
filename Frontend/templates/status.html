{% extends "base.html" %}
{% block title %}Status{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10"
     x-data="statusPage()" x-init="init()">

  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">System Status</h1>
      <p class="text-gray-500 text-sm mt-1">
        <span x-show="lastChecked">Last checked: <span x-text="lastChecked"></span></span>
        <span x-show="!lastChecked">Checking…</span>
      </p>
    </div>
    <button @click="refresh()" :disabled="loading" class="btn-secondary text-sm">
      <span x-text="loading ? 'Refreshing…' : '↻ Refresh'"></span>
    </button>
  </div>

  <!-- Error -->
  <div x-show="error" x-text="error"
       class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 mb-6 text-sm"></div>

  <!-- Healthy/Degraded banner -->
  <template x-if="data">
    <div>
      <div :class="data.status === 'healthy'
                    ? 'bg-green-50 border-green-200'
                    : 'bg-yellow-50 border-yellow-200'"
           class="rounded-xl p-5 mb-6 flex items-center gap-4 border">
        <span class="text-3xl" x-text="data.status === 'healthy' ? '✅' : '⚠️'"></span>
        <div>
          <p :class="data.status === 'healthy' ? 'text-green-800' : 'text-yellow-800'"
             class="font-semibold"
             x-text="data.status === 'healthy' ? 'All systems operational' : 'Degraded — some checks failed'"></p>
          <p class="text-sm text-gray-500 mt-0.5">
            v<span x-text="data.version"></span> ·
            <span x-text="data.environment"></span>
          </p>
        </div>
      </div>

      <!-- Check cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <template x-for="[key, value] in Object.entries(data.checks).filter(([k]) => k !== 'database_error')" :key="key">
          <div class="card flex items-center justify-between">
            <div>
              <p class="text-xs text-gray-400 uppercase tracking-wide" x-text="key.replace(/_/g,' ')"></p>
              <p class="text-sm font-medium text-gray-800 mt-0.5 truncate max-w-[160px]" x-text="value"></p>
            </div>
            <span :class="badgeClass(value)"
                  class="inline-flex items-center text-xs font-semibold px-2 py-0.5 rounded-full"
                  x-text="badgeText(value)"></span>
          </div>
        </template>
      </div>

      <!-- DB error detail -->
      <div x-show="data.checks.database_error"
           class="mt-4 bg-red-50 border border-red-200 rounded-xl p-3 text-xs text-red-700">
        <span class="font-medium">DB error:</span>
        <span x-text="data.checks.database_error"></span>
      </div>
    </div>
  </template>

  <!-- Loading placeholder -->
  <div x-show="loading && !data" class="flex items-center justify-center py-16 text-gray-400">
    <div class="text-center">
      <div class="text-3xl mb-2 animate-pulse">🔍</div>
      <p>Checking system health…</p>
    </div>
  </div>

</div>
{% endblock %}
