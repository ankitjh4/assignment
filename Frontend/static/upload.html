<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Image – DRINKOO</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="header">
    <a href="/" class="logo">DRINK<span>OO</span></a>
    <nav class="nav">
      <a href="/status.html">Status</a>
      <a href="/chat.html" id="nav-chat">Chat</a>
      <a href="/upload.html" id="nav-upload" class="active">Upload</a>
      <a href="/login.html" id="nav-login" style="display:none">Login</a>
      <a href="/signup.html" id="nav-signup" style="display:none">Sign Up</a>
      <a href="#" id="nav-logout">Logout</a>
    </nav>
  </header>

  <main>
    <div class="card" style="max-width: 540px;">
      <h2>Upload a product image</h2>
      <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.25rem;">
        Share an image related to your DRINKOO order or query. Accepted: JPEG, PNG, GIF, WebP. Max 5 MB.
      </p>

      <div id="upload-alert" class="alert"></div>

      <form id="upload-form" enctype="multipart/form-data">
        <div class="upload-box" id="upload-box">
          <div class="icon">🖼️</div>
          <p id="file-label">Click or drag an image here</p>
        </div>
        <input
          type="file"
          id="upload-file"
          name="file"
          accept="image/*"
          style="display:none"
        />
        <button type="submit" class="btn-primary full-width">Upload Image</button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 DRINKOO. | <a href="/status.html">Status</a></p>
  </footer>

  <script src="/js/app.js"></script>
  <script>initUpload(); initLogout();</script>
</body>
</html>
