<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – DRINKOO</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="header">
    <a href="/" class="logo">DRINK<span>OO</span></a>
    <nav class="nav">
      <a href="/status.html">Status</a>
      <a href="/login.html" id="nav-login">Login</a>
      <a href="/signup.html" id="nav-signup" class="btn-nav active">Sign Up</a>
      <a href="#" id="nav-logout" style="display:none">Logout</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <h2>Create your DRINKOO account</h2>

      <div id="signup-alert" class="alert"></div>

      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="e.g. samjones" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min 8 characters" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn-primary full-width">Create Account</button>
      </form>

      <p class="auth-link">Already have an account? <a href="/login.html">Log in</a></p>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 DRINKOO. | <a href="/status.html">Status</a></p>
  </footer>

  <script src="/js/app.js"></script>
  <script>initSignup();</script>
</body>
</html>
