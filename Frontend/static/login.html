<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – DRINKOO</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="header">
    <a href="/" class="logo">DRINK<span>OO</span></a>
    <nav class="nav">
      <a href="/status.html">Status</a>
      <a href="/login.html" id="nav-login" class="btn-nav active">Login</a>
      <a href="/signup.html" id="nav-signup">Sign Up</a>
      <a href="#" id="nav-logout" style="display:none">Logout</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <h2>Log in to DRINKOO</h2>

      <div id="login-alert" class="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Your username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-primary full-width">Log In</button>
      </form>

      <p class="auth-link">Don't have an account? <a href="/signup.html">Sign up</a></p>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 DRINKOO. | <a href="/status.html">Status</a></p>
  </footer>

  <script src="/js/app.js"></script>
  <script>initLogin();</script>
</body>
</html>
