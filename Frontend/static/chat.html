<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat – DRINKOO</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="header">
    <a href="/" class="logo">DRINK<span>OO</span></a>
    <nav class="nav">
      <a href="/status.html">Status</a>
      <a href="/chat.html" id="nav-chat" class="active">Chat</a>
      <a href="/upload.html" id="nav-upload">Upload</a>
      <a href="/login.html" id="nav-login" style="display:none">Login</a>
      <a href="/signup.html" id="nav-signup" style="display:none">Sign Up</a>
      <a href="#" id="nav-logout" id="logout-btn">Logout</a>
    </nav>
  </header>

  <main style="padding: 1rem 1.5rem;">
    <div class="chat-container">
      <div class="chat-header">🤖 DRINKOO Assistant</div>
      <div class="chat-window" id="chat-window"></div>
      <div class="chat-input-row">
        <input
          type="text"
          id="chat-input"
          placeholder="Ask about products, ingredients, promotions…"
          autocomplete="off"
        />
        <button class="btn-primary" id="chat-send">Send</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 DRINKOO. | <a href="/status.html">Status</a></p>
  </footer>

  <script src="/js/app.js"></script>
  <script>initChat(); initLogout();</script>
</body>
</html>
